<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HRX AudioLab</title>
<meta content="#000000" name="theme-color"/>
<link rel="stylesheet" href="css/style.css">
<link href="manifest.json" rel="manifest"/>
<link href="images/icon-192.png" rel="apple-touch-icon"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow-x:hidden;
overflow-y:auto;
overscroll-behavior-y:auto;
-webkit-overflow-scrolling:touch;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

/* Background Video */

iframe{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100vw;
height:56.25vw;
min-width:177.78vh;
min-height:100vh;
border:0;
pointer-events:none;
z-index:1;
}

/* Dark Overlay */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
z-index:2;
}

/* Watermark */

.watermark{
position:fixed;
inset:0;
background:url("images/hrx-watermark.png") center center no-repeat;
background-size:140%;
opacity:.018;
pointer-events:none;
z-index:3;
filter:grayscale(100%);
}

/* Content */

.content{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:#fff;
z-index:4;
user-select:none;
}

.content h1{
font-size:72px;
letter-spacing:10px;
font-weight:700;
text-transform:uppercase;
opacity:.10;
color:#fff;
text-shadow:0 0 18px rgba(255,255,255,.06);
}

.content p{
margin-top:15px;
font-size:18px;
letter-spacing:6px;
opacity:.08;
text-shadow:0 0 8px rgba(255,255,255,.08);
}

/* Refresh Button */
.refresh{position:fixed;top:20px;right:20px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px);color:rgba(255,255,255,.35);font-size:20px;cursor:pointer;user-select:none;z-index:999;transition:.35s;}
.refresh:hover{background:rgba(255,255,255,.12);color:#fff;transform:rotate(180deg);}

/* Mobile */

@media(max-width:768px){

iframe{
width:177.78vh;
height:100vh;
}

.watermark{
background-size:250%;
opacity:.02;
}

.content h1{
font-size:42px;
letter-spacing:4px;
opacity:.22;
color:#fff;
text-shadow:0 0 18px rgba(255,255,255,.06);
}

.content p{
font-size:14px;
letter-spacing:4px;
opacity:.08;
color:#fff;
text-shadow:0 0 10px rgba(255,255,255,.05);
}

}



/* Trustpilot */
.trustpilot{
position:fixed;
top:20px;
left:20px;
bottom:auto;
z-index:999999;
padding:10px 18px;
border-radius:40px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
color:rgba(255,255,255,.70);
font-size:12px;
letter-spacing:1px;
text-decoration:none;
transition:.35s;
}
.trustpilot:hover{
background:#00b67a;
border-color:#00b67a;
color:#fff;
box-shadow:0 0 20px rgba(0,182,122,.45);
}
@media(max-width:768px){
.trustpilot{
top:20px;
left:20px;
bottom:auto;
z-index:999999;
font-size:11px;
padding:9px 14px;
}
}


/* Footer */
.footer{position:fixed;left:0;bottom:4px;width:100%;text-align:center;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.22);z-index:5;pointer-events:none;user-select:none;}@media(max-width:768px){.footer{font-size:10px;letter-spacing:1px;bottom:4px;}}
#splash{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;z-index:99999;transition:opacity .8s}#splash .logo{text-align:center;color:#fff}#splash h1{font-size:54px;letter-spacing:10px;opacity:.9}#splash p{margin-top:15px;font-size:14px;letter-spacing:4px;opacity:.5}
.book-btn{

display:inline-block;

margin-top:40px;

padding:16px 40px;

background:#00b67a;

color:#fff;

text-decoration:none;

border-radius:50px;

font-weight:bold;

letter-spacing:2px;

transition:.3s;

box-shadow:0 0 20px rgba(0,182,122,.30);

}

.book-btn:hover{

background:#00c987;

transform:translateY(-2px);

}

@media(max-width:768px){

.book-btn{

margin-top:30px;

padding:14px 28px;

font-size:14px;

}

}
</style>

</html>
