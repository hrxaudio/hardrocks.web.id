<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HRX AudioLab</title>
<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="images/icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="apple-mobile-web-app-title" content="HRX AudioLab">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow-x:hidden;
overflow-y:auto;
overscroll-behavior-y:auto;
-webkit-overflow-scrolling:touch;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

/* Background Video */

iframe{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100vw;
height:56.25vw;
min-width:177.78vh;
min-height:100vh;
border:0;
pointer-events:none;
z-index:1;
}

/* Dark Overlay */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
z-index:2;
}

/* Watermark */

.watermark{
position:fixed;
inset:0;
background:url("images/hrx-watermark.png") center center no-repeat;
background-size:140%;
opacity:.018;
pointer-events:none;
z-index:3;
filter:grayscale(100%);
}

/* Content */

.content{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:#fff;
z-index:4;
user-select:none;
}

.content h1{
font-size:72px;
letter-spacing:10px;
font-weight:700;
text-transform:uppercase;
opacity:.10;
color:#fff;
text-shadow:0 0 18px rgba(255,255,255,.06);
}

.content p{
margin-top:15px;
font-size:18px;
letter-spacing:6px;
opacity:.08;
text-shadow:0 0 8px rgba(255,255,255,.08);
}

/* Refresh Button */
.refresh{position:fixed;top:20px;right:20px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px);color:rgba(255,255,255,.35);font-size:20px;cursor:pointer;user-select:none;z-index:999;transition:.35s;}
.refresh:hover{background:rgba(255,255,255,.12);color:#fff;transform:rotate(180deg);}

/* Mobile */

@media(max-width:768px){

iframe{
width:177.78vh;
height:100vh;
}

.watermark{
background-size:250%;
opacity:.02;
}

.content h1{
font-size:42px;
letter-spacing:4px;
opacity:.22;
color:#fff;
text-shadow:0 0 18px rgba(255,255,255,.06);
}

.content p{
font-size:14px;
letter-spacing:4px;
opacity:.08;
color:#fff;
text-shadow:0 0 10px rgba(255,255,255,.05);
}

}

</style>

</head>

<body>

<div class="refresh" onclick="location.reload()">↻</div>

<iframe
id="bgvideo"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<div class="overlay"></div>

<div class="watermark"></div>

<div class="content">
<h1>HRX AudioLab</h1>
<p>HIGH END AUDIO PRODUCTION</p>
</div>

<script>

const videos=[
"MbtBbdLSs6I",
"emUQ9CQAtwE",
"dxSghamkPho",
"4XJePuR1C9I",
"4aI0jdtU0w4",
"NIPV_5ItCYw"
];

const random=videos[Math.floor(Math.random()*videos.length)];

document.getElementById("bgvideo").src=
`https://www.youtube.com/embed/${random}?autoplay=1&mute=1&loop=1&playlist=${random}&controls=0&rel=0&modestbranding=1&playsinline=1`;

</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then(reg => console.log("Service Worker registered"))
      .catch(err => console.log("Service Worker failed", err));
  });
}
</script>

<div style="height:2px;"></div>
</body>
</html>
