<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HRX AudioLab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

/* Background Video */
iframe{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100vw;
height:56.25vw;
min-width:177.78vh;
min-height:100vh;
border:0;
pointer-events:none;
z-index:1;
}

/* Dark Overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.30);
z-index:2;
}

/* Watermark */
.watermark{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("images/hrx-watermark.png") center center no-repeat;
background-size:65%;
opacity:.05;
pointer-events:none;
z-index:3;
filter:grayscale(100%);
}

/* Content */
.content{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:#fff;
z-index:4;
}

.content h1{
font-size:72px;
letter-spacing:10px;
font-weight:700;
text-transform:uppercase;
}

.content p{
margin-top:15px;
font-size:18px;
letter-spacing:4px;
opacity:.85;
}

/* Mobile */
@media(max-width:768px){

iframe{
width:177.78vh;
height:100vh;
}

.watermark{
background-size:95%;
opacity:.04;
}

.content h1{
font-size:40px;
letter-spacing:4px;
}

.content p{
font-size:14px;
}

}

</style>

</head>

<body>

<iframe
src="https://www.youtube.com/embed/videoseries?list=PLdnwY9KfM2JQ&autoplay=1&mute=1&loop=1&playlist=PLdnwY9KfM2JQ&controls=0&rel=0&modestbranding=1&playsinline=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<div class="overlay"></div>

<div class="watermark"></div>

<div class="content">
<h1>HRX AUDIOLAB</h1>
<p>INDEPENDENT AUDIO LABEL</p>
</div>

</body>
</html>
